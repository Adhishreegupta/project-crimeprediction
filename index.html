<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crime Rate Prediction</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto Mono', monospace;
      color: #f8f8f8;
      background: #0a0a0a url('https://i.ibb.co/SVKbJjP/police-tape.jpg') no-repeat center center fixed;
      background-size: cover;
      background-blend-mode: multiply;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      background-color: rgba(10, 10, 10, 0.95);
      border: 2px solid yellow;
      max-width: 500px;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
      text-align: center;
    }

    h1 {
      color: yellow;
      font-size: 1.8rem;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    label {
      display: block;
      margin-top: 15px;
      color: #ddd;
      font-size: 0.9rem;
      text-align: left;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #444;
      border-radius: 5px;
      background-color: #222;
      color: #fff;
      font-size: 1rem;
      transition: border 0.2s;
    }

    input:focus, select:focus {
      border-color: yellow;
      outline: none;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      border: none;
      border-radius: 5px;
      background: yellow;
      color: #000;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #d4af37;
    }

    .result {
      margin-top: 20px;
      padding: 10px;
      background-color: #111;
      border-left: 5px solid yellow;
      font-size: 18px;
      color: #f5f5f5;
    }

    .crime-tape {
      width: 100%;
      height: 16px;
      background: repeating-linear-gradient(
        45deg,
        yellow,
        yellow 15px,
        black 15px,
        black 30px
      );
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="crime-tape"></div>
    <h1>Crime Rate Predictor</h1>
    <form id="crimeForm">
      <label for="year">Year:</label>
      <input type="number" id="year" name="year" required>

      <label for="city">City:</label>
      <input type="text" id="city" name="city" required>

      <label for="population">Population (in Lakhs):</label>
      <input type="number" id="population" name="population" step="0.01" required>

      <label for="type">Type of Crime:</label>
      <select id="type" name="type" required>
        <option value="">--Select--</option>
        <option value="Murder">Murder</option>
        <option value="Theft">Theft</option>
        <option value="Assault">Assault</option>
        <option value="Kidnapping">Kidnapping</option>
        <option value="Robbery">Robbery</option>
      </select>

      <button type="submit">Predict</button>
    </form>

    <div class="result" id="resultBox" style="display: none;">
      Predicted Crime Rate: <span id="resultValue"></span>
    </div>
  </div>

  <script>
    document.getElementById('crimeForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const year = document.getElementById('year').value;
      const city = document.getElementById('city').value;
      const population = document.getElementById('population').value;
      const type = document.getElementById('type').value;

      const payload = {
        Year: parseFloat(year),
        City: city,
        Population: parseFloat(population),
        Type: type
      };

      try {
        const response = await fetch('http://127.0.0.1:5000/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        const prediction = result.predicted_rate.toFixed(2);
        
        document.getElementById('resultBox').style.display = 'block';
        document.getElementById('resultValue').innerText = prediction;

      } catch (error) {
        alert("Prediction failed. Is your backend running?");
        console.error("Error:", error);
      }
    });
  </script>
</body>
</html>
